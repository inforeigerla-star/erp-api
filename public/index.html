<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You One Racing — ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img src="assets/logo.jpg" alt="You One Racing" class="login-logo">
    <h1>YOU ONE RACING<span>S.A.S.</span></h1>
    <div class="field"><label>Usuario</label><input id="loginUser" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="loginPass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="shell" id="appShell" style="display:none">
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.jpg" alt="You One Racing" class="brand-logo" id="brandLogo">
      <span class="brand-name">YOU ONE RACING<span class="brand-dim">S.A.S.</span></span>
    </div>

    <div class="bu-picker">
      <label>Unidad de negocio</label>
      <select id="buSelect"></select>
      <button class="btn btn-sm" style="width:100%;margin-top:6px" onclick="newBusinessUnitModal()">+ Nueva unidad</button>
      <button class="btn btn-sm btn-danger" style="width:100%;margin-top:10px;font-size:11.5px" onclick="deleteCurrentBusinessUnit()">Eliminar unidad actual</button>
    </div>

    <nav class="nav">
      <div class="nav-group">
        <span class="nav-label">General</span>
        <button class="nav-item active" data-view="dashboard">Panel</button>
        <button class="nav-item" data-view="reports">Reportes</button>
      </div>
      <div class="nav-group">
        <span class="nav-label">Finanzas</span>
        <button class="nav-item" data-view="cash">Finanzas</button>
      </div>
      <div class="nav-group">
        <span class="nav-label">Operaciones</span>
        <button class="nav-item" data-view="purchases">Compras</button>
        <button class="nav-item" data-view="sales">Ventas</button>
        <button class="nav-item" data-view="quotes">Presupuestos</button>
        <button class="nav-item" data-view="shipments">Remitos de envío</button>
        <button class="nav-item" data-view="debtors">Deudores</button>
      </div>
      <div class="nav-group">
        <span class="nav-label">Maestros</span>
        <button class="nav-item" data-view="stock">Stock</button>
        <button class="nav-item" data-view="articles">Artículos</button>
        <button class="nav-item" data-view="warehouses">Depósitos</button>
        <button class="nav-item" data-view="suppliers">Proveedores</button>
        <button class="nav-item" data-view="customers">Clientes</button>
        <button class="nav-item" data-view="projects">Proyectos</button>
      </div>
      <div class="nav-group" id="adminNavGroup" style="display:none">
        <span class="nav-label">Administración</span>
        <button class="nav-item" data-view="users">Usuarios</button>
        <button class="nav-item" data-view="trash">Papelera</button>
      </div>
    </nav>

    <div class="user-box">
      <span id="currentUserLabel"></span>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
    <div class="conn-status" id="connStatus">
      <span class="dot"></span>
      <span class="conn-text">Conectando…</span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <img id="topbarWatermark" class="topbar-watermark" alt="">
      <h1 id="viewTitle">Panel</h1>
      <div class="global-search-wrap" id="globalSearchWrap">
        <input type="text" id="globalSearchInput" class="global-search-input" placeholder="Buscar venta, compra, cliente, proveedor o artículo…" autocomplete="off" oninput="globalSearchDebounced()" onkeydown="globalSearchKeydown(event)">
      </div>
      <div class="topbar-actions" id="viewActions"></div>
    </header>

    <div class="view" id="view"></div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal"></div>
</div>

<!-- Fuera del topbar a propósito: el topbar tiene overflow:hidden (para recortar
     el watermark) y eso cortaba este dropdown. Se posiciona con JS (ver
     runGlobalSearch en app.js) tomando como referencia #globalSearchInput. -->
<div class="global-search-results" id="globalSearchResults" style="display:none"></div>

<div class="toast-stack" id="toastStack"></div>

<div class="working-indicator" id="workingIndicator" style="display:none">
  <span class="working-spinner"></span>
  <span id="workingIndicatorText">Trabajando…</span>
</div>

<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
